<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{CHTITLE}} · qcfinancial · docs</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/stix-two-math@5/index.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/stix-two-text@5/500-italic.css">

  <!-- The theme contract -->
  <link rel="stylesheet" href="{{CSS}}">

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$','$']], displayMath: [['$$','$$']] },
      options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js" async></script>
</head>

<body>
  <div class="qcf-doc">

    <!-- TOP BAR -->
    <header class="qcf-topbar">
      <div class="qcf-topbar__inner">
        <a class="qcf-logo" href="index.html">
          <span class="qcf-logo__badge"><span class="qcf-logo__glyph">&#8474;&#8450;</span></span>
          <span class="qcf-logo__word">financial</span>
          <span class="qcf-tag">docs</span>
        </a>
        <div class="qcf-topbar__spacer"></div>

        <div class="qcf-search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4-4"></path></svg>
          <span>Buscar en la documentación&hellip;</span>
          <span class="qcf-search__kbd">&#8984;K</span>
        </div>

        <div class="qcf-lang">
          <button class="qcf-lang__btn is-active" type="button">ES</button>
          <button class="qcf-lang__btn" type="button">EN</button>
        </div>

        <a class="qcf-iconbtn" href="https://github.com/qcfinancial/qcfinancial-docs" target="_blank" rel="noopener" aria-label="GitHub">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 014 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
        </a>
      </div>
    </header>

    <!-- 3-COLUMN GRID -->
    <div class="qcf-grid">

      <!-- LEFT: chapter nav -->
      <aside class="qcf-sidebar qcf-scroll">
        <div class="qcf-eyebrow" style="padding:0 12px 12px;">Guía</div>
        <nav class="qcf-nav">
{{NAV}}
        </nav>

{{CALLOUT}}
      </aside>

      <!-- CENTER: notebook body -->
      <main class="qcf-main">
        <div class="qcf-breadcrumb"><span>Guía</span><span>/</span><span class="qcf-breadcrumb__here">{{CHTITLE}}</span></div>
        <div class="qcf-titlerow">
          <h1 class="qcf-h1">{{CHTITLE}}</h1>
          <a class="qcf-demo-btn" href="https://qcf-demo-app.streamlit.app" target="_blank" rel="noopener">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3l14 9-14 9V3z"></path></svg>
            Abrir en la demo
          </a>
        </div>
        <hr class="qcf-rule">

        <!-- {{ content }} -->
{{CONTENT}}

        <!-- {{ pager }} -->
{{PAGER}}
      </main>

      <!-- RIGHT: on-this-page -->
      <aside class="qcf-toc qcf-scroll">
        <div class="qcf-eyebrow">En esta página</div>
        <nav class="qcf-toc__list">
{{TOC}}
        </nav>
      </aside>

    </div>
  </div>

  <script>
    // 1. collapsible code cells
    document.querySelectorAll('.nb-in__bar').forEach(function (bar) {
      bar.addEventListener('click', function () {
        var cell = bar.closest('.nb-in');
        cell.classList.toggle('is-collapsed');
        var left = bar.querySelector('.nb-in__barleft');
        var hid = left.querySelector('.nb-in__hidden');
        if (cell.classList.contains('is-collapsed')) {
          if (!hid) { hid = document.createElement('span'); hid.className = 'nb-in__hidden'; hid.textContent = '···'; left.appendChild(hid); }
        } else if (hid) { hid.remove(); }
      });
    });
    // 2. math
    if (window.MathJax && window.MathJax.typesetPromise) { window.MathJax.typesetPromise(); }
    // 3. TOC scroll-spy
    var tocItems = Array.prototype.slice.call(document.querySelectorAll('.qcf-toc__item'));
    var heads = tocItems.map(function (a) { return document.getElementById(a.getAttribute('href').slice(1)); });
    if ('IntersectionObserver' in window && heads.length) {
      var spy = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) {
            tocItems.forEach(function (a) { a.classList.remove('is-active'); });
            var idx = heads.indexOf(e.target);
            if (idx >= 0) tocItems[idx].classList.add('is-active');
          }
        });
      }, { rootMargin: '0px 0px -75% 0px' });
      heads.forEach(function (h) { if (h) spy.observe(h); });
    }
  </script>
</body>
</html>
